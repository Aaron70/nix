[backdrop]
blur_intensity = 0.0
tint_intensity = 0.0

[bar]
order = [ "default" ]

    [bar.default]
    background_opacity = 0.0
    capsule_opacity = 0.0
    capsule_radius = 12
    capsule_thickness = 0.79999998584389687
    center = [ "media", "privacy" ]
    end = [ "group:g3", "group:g2", "group:g1", "group:g4" ]
    margin_edge = 5
    margin_ends = 10
    shadow = false
    start = [ "control-center", "workspaces" ]
    thickness = 25

        [[bar.default.capsule_group]]
        fill = "surface_variant"
        id = "g1"
        members = [ "clock", "date" ]
        opacity = 0.0
        padding = 6.0
        radius = 12.0

        [[bar.default.capsule_group]]
        fill = "surface_variant"
        id = "g2"
        members = [ "volume", "brightness", "battery" ]
        opacity = 0.0
        padding = 6.0
        radius = 12.0

        [[bar.default.capsule_group]]
        fill = "surface_variant"
        id = "g3"
        members = [ "network", "bluetooth" ]
        opacity = 0.0
        padding = 6.0
        radius = 12.0

        [[bar.default.capsule_group]]
        fill = "surface_variant"
        id = "g4"
        members = [ "notifications", "session" ]
        opacity = 0.0
        padding = 6.0
        radius = 12.0

[calendar]
enabled = true

    [calendar.account.personal_google]
    color = "primary"
    name = "Personal Calendar"
    type = "google"

[control_center]
hidden_tabs = [ "weather" ]

    [[control_center.shortcuts]]
    type = "caffeine"

    [[control_center.shortcuts]]
    type = "nightlight"

    [[control_center.shortcuts]]
    type = "notification"

    [[control_center.shortcuts]]
    type = "power_profile"

    [[control_center.shortcuts]]
    type = "clipboard"

[dock]
active_monitor_only = true
active_scale = 1.1000000163912773
auto_hide = true
background_opacity = 0.99999997764825821
enabled = true
icon_size = 30
launcher_icon = "layout-dashboard-filled"
launcher_position = "start"
magnification_scale = 1.3000000044703484
main_axis_padding = 10
reserve_space = false
shadow = false

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-2", "lockscreen-login-box@eDP-1", "lockscreen-login-box@HDMI-A-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-2"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "DP-2"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-2".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 640.0
    cy = 681.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[nightlight]
enabled = true

[osd]
background_opacity = 0.74999998323619366
position = "top_right"
position_vertical = "top_right"

[plugins]
enabled = [ "noctalia/screen_recorder" ]

[shell]
font_family = "JetBrainsMono Nerd Font Mono"
niri_overview_type_to_launch_enabled = true
screen_time_enabled = true
settings_show_advanced = true
telemetry_enabled = true

    [shell.launcher]
    app_grid = true
    compact = true

    [shell.panel]
    control_center_placement = "floating"
    open_near_click_control_center = true
    session_placement = "floating"
    session_position = "center"

[theme]
builtin = "Tokyo-Night"
community_palette = "Oxocarbon"
mode = "dark"
source = "builtin"
wallpaper_scheme = "m3-content"

[wallpaper]
directory = "/home/aaronv/nix/resources/wallpapers"

    [wallpaper.default]
    path = "/home/aaronv/nix/resources/wallpapers/wallhaven.jpg"

    [wallpaper.last]
    path = "/home/aaronv/nix/resources/wallpapers/wallhaven.jpg"

    [wallpaper.monitors.eDP-1]
    path = "/home/aaronv/nix/resources/wallpapers/wallhaven.jpg"

[widget.control-center]
glyph = "brand-dribbble-filled"

[widget.media]
hide_when_no_media = true
title_scroll = "always"

[widget.network]
show_label = false

[widget.privacy]
active_color = "error"
hide_inactive = true

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.workspaces]
display = "none"
hide_when_empty = true
pill_scale = 0.75
